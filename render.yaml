services:
  - type: web
    name: bfhl-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: ./bfhl-api
    region: oregon
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    healthCheckPath: /health
